<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6Minds — Will Your Idea Survive?</title>
  <link rel="icon" type="image/png" href="/static/icons/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000000;
      --surface:   #111111;
      --surface-2: #181818;
      --border:    #222222;
      --border-2:  #2e2e2e;
      --text:      #f2f2f2;
      --muted:     #666;
      --accent:    #ff4500;
      --red:       #ef4444;
      --orange:    #f97316;
      --green:     #22c55e;
      --amber:     #f59e0b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 1.5rem 6rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 4rem 0 2.5rem;
      margin-bottom: 1rem;
    }

    .site-title {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    /* ── Input panel ── */
    .input-panel {
      max-width: 680px;
      margin: 0 auto 3rem;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      padding: 1.1rem 1.25rem;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,69,0,0.12);
    }

    .textarea-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
      gap: 1rem;
    }

    .input-hint {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    .char-counter {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .char-counter.near-limit { color: var(--orange); }
    .char-counter.at-limit   { color: var(--red); font-weight: 600; }

    .analyze-btn {
      margin-top: 0.85rem;
      width: 100%;
      background: #ff4500;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 0.9rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(255,69,0,0.25);
    }

    .analyze-btn:hover:not(:disabled) {
      background: #e03d00;
      box-shadow: 0 4px 32px rgba(255,69,0,0.4);
    }

    .analyze-btn:active:not(:disabled) { transform: scale(0.99); }
    .analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .error-msg {
      margin-top: 0.85rem;
      color: var(--red);
      font-size: 0.9rem;
      display: none;
    }

    /* ── Loading ── */
    #loading {
      display: none;
      text-align: center;
      padding: 4rem 0;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }

    .loader-text {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .loader-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { display: none; }

    .results-label {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ── Expert grid ── */
    .roast-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      max-width: 1140px;
      margin: 0 auto 1rem;
    }

    @media (max-width: 860px) {
      .roast-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .roast-grid { grid-template-columns: 1fr; }
    }

    .roast-card {
      background: #111111;
      border: 1px solid #222222;
      border-radius: 16px;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s;
    }

    .roast-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .roast-card:hover { border-color: var(--border-2); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
    }

    .card-emoji {
      font-size: 1.5rem;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-header-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .card-persona {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .card-angle {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
    }

    /* ── Key insight box ── */
    .card-insight {
      background: rgba(255,69,0,0.08);
      border-left: 3px solid #ff4500;
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 0.9rem;
    }

    .insight-label {
      display: block;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #ff6533;
      margin-bottom: 0.35rem;
    }

    .insight-text {
      font-size: 0.82rem;
      line-height: 1.55;
      color: #ffb899;
    }

    /* ── Score bar row ── */
    .card-severity {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .score-label-text {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      min-width: 80px;
    }

    .severity-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border-2);
      border-radius: 99px;
      overflow: hidden;
    }

    .severity-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .severity-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Viability score ── */
    .score-section {
      max-width: 1140px;
      margin: 2rem auto 0;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-align: center;
    }

    .score-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .score-number {
      font-size: clamp(5rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      transition: color 0.5s;
    }

    .score-suffix {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0;
      opacity: 0.4;
    }

    .score-verdict {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
    }

    .score-red    { color: var(--red); }
    .score-orange { color: var(--orange); }
    .score-green  { color: #ff4500; }

    /* ── Sub scores ── */
    .sub-scores {
      max-width: 480px;
      margin: 2rem auto 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      text-align: left;
    }

    .sub-score-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sub-score-label {
      font-size: 0.72rem;
      color: var(--muted);
      min-width: 150px;
    }

    .sub-score-track {
      flex: 1;
      height: 4px;
      background: var(--border-2);
      border-radius: 99px;
      overflow: hidden;
    }

    .sub-score-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sub-score-value {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      min-width: 36px;
      text-align: right;
    }

    /* ── Action buttons ── */
    .score-actions {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      color: var(--text);
      border-color: #444;
      background: var(--surface-2);
    }

    .copy-btn.copied { color: var(--green); border-color: var(--green); }
    .copy-btn svg { flex-shrink: 0; }

    .rescue-btn {
      width: 100%;
      max-width: 480px;
      background: #ff4500;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(255,69,0,0.25);
    }

    .rescue-btn:hover {
      background: #e03d00;
      box-shadow: 0 4px 32px rgba(255,69,0,0.4);
    }

    .rescue-btn:active { transform: scale(0.99); }

    /* ── Collapsible full analysis ── */
    .critic-full-text {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
      line-height: 1.75;
      color: #ccc;
    }

    .critic-full-text.expanded { display: block; }

    .expand-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 0 0 0;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }

    .expand-btn:hover { color: rgba(255,255,255,0.65); }
  </style>
</head>
<body>

  <nav style="height:48px; border-bottom:1px solid #222222; background:#000000;"></nav>

  <header>
    <div style="text-align:center; margin-bottom:32px; padding-top:48px;">
      <img src="/static/icons/logo.png" alt="6Minds" style="width:280px; height:auto; object-fit:contain;">
      <p style="margin-top:16px; font-size:15px; color:rgba(255,255,255,0.45); letter-spacing:0.5px;">6 expert minds. Real market analysis. No sugarcoating.</p>
    </div>
  </header>

  <div class="input-panel">
    <textarea
      id="idea"
      placeholder="Describe your startup idea... What problem does it solve? Who is it for? How does it make money?"
      rows="5"
      maxlength="500"
    ></textarea>
    <div class="textarea-footer">
      <span class="input-hint">The more detail you give, the better the analysis. Vague ideas get vague feedback.</span>
      <span class="char-counter" id="charCounter">0 / 500</span>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeIdea()">Analyze My Idea →</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <div id="loading">
    <div class="loader-ring"></div>
    <p class="loader-text">Consulting the experts<span class="loader-dots"></span></p>
  </div>

  <div id="results">
    <p class="results-label">The Verdict Is In</p>

    <div class="roast-grid" id="roastGrid"></div>

    <div class="score-section">
      <p class="score-title">Startup Viability Score</p>
      <div class="score-number" id="scoreNumber">—<span class="score-suffix">/100</span></div>
      <p class="score-verdict" id="scoreVerdict"></p>

      <div class="sub-scores" id="subScores"></div>

      <div class="score-actions">
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">
          <svg id="copyIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <svg id="checkIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="copyLabel">Copy Result</span>
        </button>
        <button class="rescue-btn" id="rescueBtn" onclick="rescueIdea()">Get Your Startup Battle Plan →</button>
      </div>
    </div>
  </div>

  <form id="rescueForm" action="/rescue" method="POST" style="display:none">
    <input type="hidden" name="idea" id="rescueIdea">
    <input type="hidden" name="roasts" id="rescueRoasts">
    <input type="hidden" name="survival_score" id="rescueSurvivalScore">
  </form>

  <script>
    let lastResult = null; // { idea, roasts, survival_score, sub_scores }
    let currentIdea = '';

    function rescueIdea() {
      if (!lastResult) return;
      const roastsSummary = lastResult.roasts.map(c => c.key_insight).join(' | ');
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/rescue';
      const ideaInput = document.createElement('input');
      ideaInput.name = 'idea';
      ideaInput.value = currentIdea;
      const roastsInput = document.createElement('input');
      roastsInput.name = 'roasts_summary';
      roastsInput.value = roastsSummary;
      form.appendChild(ideaInput);
      form.appendChild(roastsInput);
      document.body.appendChild(form);
      form.submit();
    }

    function formatResult({ idea, roasts, survival_score }) {
      const lines = [];
      lines.push(`💡 "${idea}"`);
      lines.push('');
      lines.push('I had my startup idea evaluated by 6 experts:\n');
      roasts.forEach(r => {
        lines.push(`${r.emoji} ${r.persona.toUpperCase()}`);
        lines.push(r.roast);
        if (r.key_insight) lines.push(`Key insight: ${r.key_insight}`);
        lines.push('');
      });
      lines.push(`🌍 Startup Viability Score: ${survival_score}/100`);
      lines.push(`"${scoreVerdict(survival_score)}"`);
      lines.push('');
      lines.push('Test your idea → 6minds.app');
      return lines.join('\n');
    }

    async function copyResult() {
      if (!lastResult) return;
      const btn = document.getElementById('copyBtn');
      const copyIcon = document.getElementById('copyIcon');
      const checkIcon = document.getElementById('checkIcon');
      const label = document.getElementById('copyLabel');
      try {
        await navigator.clipboard.writeText(formatResult(lastResult));
        btn.classList.add('copied');
        copyIcon.style.display = 'none';
        checkIcon.style.display = '';
        label.textContent = 'Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          copyIcon.style.display = '';
          checkIcon.style.display = 'none';
          label.textContent = 'Copy Result';
        }, 2200);
      } catch {
        label.textContent = 'Copy failed';
        setTimeout(() => { label.textContent = 'Copy Result'; }, 2000);
      }
    }

    function severityColor(s) {
      if (s >= 8) return '#ef4444';
      if (s >= 5) return '#f97316';
      return '#22c55e';
    }

    function subScoreColor(pct) {
      return '#ff4500';
    }

    function toggleCritic(btn) {
      const card = btn.closest('.roast-card');
      const fullText = card.querySelector('.critic-full-text');
      const isExpanded = fullText.classList.contains('expanded');
      fullText.classList.toggle('expanded');
      btn.textContent = isExpanded ? 'Read full analysis ↓' : 'Collapse ↑';
    }

    function buildCard(roast, index) {
      const card = document.createElement('div');
      card.className = 'roast-card';
      card.style.transitionDelay = `${index * 80}ms`;

      const fillPct = (roast.severity / 10) * 100;
      const barColor = severityColor(roast.severity);
      const insightHtml = roast.key_insight ? `
        <div class="card-insight">
          <span class="insight-label">Key Insight</span>
          <p class="insight-text">${escapeHtml(roast.key_insight)}</p>
        </div>
      ` : '';

      card.innerHTML = `
        <div class="card-header">
          <span class="card-emoji">${roast.emoji}</span>
          <div class="card-header-text">
            <span class="card-persona">${escapeHtml(roast.persona)}</span>
            <span class="card-angle">${escapeHtml(roast.angle || '')}</span>
          </div>
        </div>
        <div class="card-divider"></div>
        ${insightHtml}
        <button class="expand-btn" onclick="toggleCritic(this)">Read full analysis ↓</button>
        <div class="critic-full-text">${escapeHtml(roast.roast)}</div>
        <div class="card-severity">
          <span class="score-label-text">${escapeHtml(roast.score_label || '')}</span>
          <div class="severity-bar-track">
            <div class="severity-bar-fill" style="width:0%;background:${barColor}" data-fill="${fillPct}"></div>
          </div>
          <span class="severity-label">${roast.severity}/10</span>
        </div>
      `;
      return card;
    }

    function buildSubScores(subScores) {
      const dims = [
        { label: 'Market Opportunity', key: 'market' },
        { label: 'Differentiation',    key: 'differentiation' },
        { label: 'Execution Feasibility', key: 'execution' },
        { label: 'Timing & Trends',    key: 'timing' },
      ];
      return dims.map(d => {
        const val = subScores[d.key] || 0;
        const pct = (val / 25) * 100;
        const color = subScoreColor(pct);
        return `
          <div class="sub-score-row">
            <span class="sub-score-label">${d.label}</span>
            <div class="sub-score-track">
              <div class="sub-score-fill" style="width:0%;background:${color}" data-fill="${pct}"></div>
            </div>
            <span class="sub-score-value">${val}/25</span>
          </div>`;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function scoreVerdict(n) {
      if (n <= 20) return "Don't quit your day job.";
      if (n <= 35) return "This needs serious rethinking.";
      if (n <= 50) return "Interesting but needs major differentiation.";
      if (n <= 65) return "Has potential — execution is everything.";
      if (n <= 80) return "Strong idea. Move fast.";
      return "Why are you still reading this? Go build it.";
    }

    async function analyzeIdea() {
      const idea = document.getElementById('idea').value.trim();
      const btn = document.getElementById('analyzeBtn');
      const errorMsg = document.getElementById('errorMsg');
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const grid = document.getElementById('roastGrid');

      errorMsg.style.display = 'none';

      if (!idea) {
        errorMsg.textContent = 'Please describe your idea first.';
        errorMsg.style.display = 'block';
        return;
      }

      if (idea.length < 15) {
        errorMsg.textContent = 'Please describe your idea in more detail — what problem does it solve and for who?';
        errorMsg.style.display = 'block';
        return;
      }

      // Reset state
      btn.disabled = true;
      btn.textContent = 'Analyzing...';
      loading.style.display = 'block';
      results.style.display = 'none';
      grid.innerHTML = '';
      const rescueBtn = document.getElementById('rescueBtn');
      if (rescueBtn) rescueBtn.style.display = '';

      try {
        const res = await fetch('/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idea }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');

        currentIdea = idea;
        lastResult = { idea, roasts: data.roasts, survival_score: data.survival_score, sub_scores: data.sub_scores };

        data.roasts.forEach((roast, i) => {
          grid.appendChild(buildCard(roast, i));
        });

        const score = data.survival_score;
        const scoreEl = document.getElementById('scoreNumber');
        const verdictEl = document.getElementById('scoreVerdict');
        const subScoresEl = document.getElementById('subScores');

        if (data.not_an_idea) {
          scoreEl.className = 'score-number score-red';
          scoreEl.innerHTML = `0<span class="score-suffix">/100</span>`;
          verdictEl.innerHTML = `That's not an idea. That's a product that already exists.<br><strong style="color:var(--text)">Try describing YOUR idea.</strong>`;
          subScoresEl.innerHTML = '';
          if (rescueBtn) rescueBtn.style.display = 'none';
        } else {
          scoreEl.className = 'score-number ' + (score <= 35 ? 'score-red' : score <= 65 ? 'score-orange' : 'score-green');
          scoreEl.innerHTML = `${score}<span class="score-suffix">/100</span>`;
          verdictEl.textContent = scoreVerdict(score);
          subScoresEl.innerHTML = buildSubScores(data.sub_scores || {});
          if (rescueBtn) rescueBtn.style.display = '';
        }

        loading.style.display = 'none';
        results.style.display = 'block';

        requestAnimationFrame(() => {
          document.querySelectorAll('.roast-card').forEach(card => card.classList.add('visible'));
        });

        setTimeout(() => {
          document.querySelectorAll('.severity-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.fill + '%';
          });
          document.querySelectorAll('.sub-score-fill').forEach(bar => {
            bar.style.width = bar.dataset.fill + '%';
          });
        }, 200);

        results.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        loading.style.display = 'none';
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze My Idea →';
      }
    }

    const ideaEl = document.getElementById('idea');
    const counterEl = document.getElementById('charCounter');
    const LIMIT = 500;

    ideaEl.addEventListener('input', () => {
      const len = ideaEl.value.length;
      counterEl.textContent = `${len} / ${LIMIT}`;
      counterEl.className = 'char-counter' + (len >= LIMIT ? ' at-limit' : len >= LIMIT * 0.85 ? ' near-limit' : '');
    });

    ideaEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) analyzeIdea();
    });
  </script>
</body>
</html>
